<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Smart Attendance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gradient-to-tr from-slate-950 via-indigo-950 to-slate-950 min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md bg-white/5 backdrop-blur-lg border border-white/10 p-8 rounded-2xl shadow-2xl">
        
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-14 h-14 bg-indigo-600 rounded-xl mb-3 shadow-lg shadow-indigo-500/30">
                <i class="fa-solid fa-user-shield text-white text-2xl"></i>
            </div>
            <h2 class="text-3xl font-bold text-white tracking-tight">Smart Attendance</h2>
            <p class="text-slate-400 mt-2 text-sm">Authorized Portal Access Only</p>
        </div>

        <div id="alert-box" class="hidden mb-5 p-4 rounded-xl text-sm font-medium border flex items-center gap-3">
            <i id="alert-icon" class="fa-solid"></i>
            <span id="alert-message"></span>
        </div>

        <form id="loginForm" class="space-y-5">
            <div>
                <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Email Address</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-500">
                        <i class="fa-solid fa-envelope"></i>
                    </span>
                    <input type="email" id="email" required
                        class="w-full pl-10 pr-4 py-3 bg-slate-900/60 border border-slate-800 rounded-xl text-white placeholder-slate-600 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all" 
                        placeholder="admin@institution.com">
                </div>
            </div>

            <div>
                <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Password</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-500">
                        <i class="fa-solid fa-lock"></i>
                    </span>
                    <input type="password" id="password" required
                        class="w-full pl-10 pr-4 py-3 bg-slate-900/60 border border-slate-800 rounded-xl text-white placeholder-slate-600 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all" 
                        placeholder="••••••••">
                </div>
            </div>

            <button type="submit" id="submitBtn"
                class="w-full py-3 bg-indigo-600 hover:bg-indigo-500 text-white font-semibold rounded-xl shadow-lg shadow-indigo-600/30 transition-all duration-200 transform active:scale-[0.98] flex items-center justify-center gap-2">
                <span>Sign In</span>
                <i class="fa-solid fa-arrow-right text-xs"></i>
            </button>
        </form>

        <div class="mt-6 text-center">
    <a href="/register-page"
       class="text-indigo-400 hover:text-indigo-300 text-sm">
        Request Account Access
    </a>
</div>
    </div>

   <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            const alertBox = document.getElementById('alert-box');
            const alertMsg = document.getElementById('alert-message');
            const alertIcon = document.getElementById('alert-icon');
            const submitBtn = document.getElementById('submitBtn');

            // Visual loading feedback
            submitBtn.disabled = true;
            submitBtn.innerHTML = `<i class="fa-solid fa-circle-notch animate-spin"></i> <span>Verifying...</span>`;

            try {
                const response = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                const result = await response.json();

                if (result.status === 'success') {
                    // Update alert styles to Success theme
                    alertBox.className = "mb-5 p-4 rounded-xl text-sm font-medium border flex items-center gap-3 bg-emerald-500/10 border-emerald-500/20 text-emerald-400";
                    alertIcon.className = "fa-solid fa-circle-check";
                    alertMsg.innerText = "Login successful! Redirecting to your dashboard...";
                    alertBox.classList.remove('hidden');
                    
                    // --- DYNAMIC ROLE-BASED REDIRECT FIX ---
                    setTimeout(() => {
                        // Extract the role from backend response and sanitize it
                        const userRole = result.user.role.toLowerCase().trim();
                        
                        // Redirect to the correct folder structure path base
                        if (userRole === 'teacher') {
                            window.location.href = '/teacher-dashboard'; 
                        } else if (userRole === 'admin') {
                            window.location.href = '/admin-dashboard';
                        } else if (userRole === 'parent') {
                            window.location.href = '/parent-dashboard';
                        } else {
                            // Fallback to the general blueprint dashboard route
                            window.location.href = '/dashboard'; 
                        }
                    }, 1200);

                } else {
                    // Update alert styles to Error theme
                    alertBox.className = "mb-5 p-4 rounded-xl text-sm font-medium border flex items-center gap-3 bg-rose-500/10 border-rose-500/20 text-rose-400";
                    alertIcon.className = "fa-solid fa-circle-exclamation";
                    alertMsg.innerText = result.message;
                    alertBox.classList.remove('hidden');
                    
                    // Reset button states
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = `<span>Sign In</span> <i class="fa-solid fa-arrow-right text-xs"></i>`;
                }
            } catch (err) {
                console.error("Authentication Error: ", err);
                alertBox.className = "mb-5 p-4 rounded-xl text-sm font-medium border flex items-center gap-3 bg-rose-500/10 border-rose-500/20 text-rose-400";
                alertIcon.className = "fa-solid fa-server";
                alertMsg.innerText = "Server connection lost. Please try again.";
                alertBox.classList.remove('hidden');
                
                submitBtn.disabled = false;
                submitBtn.innerHTML = `<span>Sign In</span> <i class="fa-solid fa-arrow-right text-xs"></i>`;
            }
        });
    </script>
</body>
</html>
