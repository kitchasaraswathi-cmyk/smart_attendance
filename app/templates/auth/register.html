<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Smart Attendance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gradient-to-tr from-slate-950 via-indigo-950 to-slate-950 min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md bg-white/5 backdrop-blur-lg border border-white/10 p-8 rounded-2xl shadow-2xl text-center">
        
        <div class="inline-flex items-center justify-center w-14 h-14 bg-indigo-600 rounded-xl mb-4 shadow-lg shadow-indigo-500/30">
            <i class="fa-solid fa-user-lock text-white text-2xl"></i>
        </div>
        
        <h2 class="text-3xl font-bold text-white tracking-tight">Access Restricted</h2>
        <p class="text-slate-400 mt-3 text-sm leading-relaxed">
            Self-registration is disabled for this portal. New system accounts can only be authorized and created by a system administrator.
        </p>

        <div class="mt-6 p-4 bg-indigo-500/10 border border-indigo-500/20 rounded-xl text-xs text-indigo-300 flex items-start gap-3 text-left">
            <i class="fa-solid fa-circle-info mt-0.5 text-sm"></i>
            <span>If you are a faculty member, teacher, or parent awaiting system access, please reach out directly to your institution's IT helpdesk.</span>
        </div>

        <div class="mt-8">
            <a href="/login-page" 
                class="inline-flex w-full items-center justify-center gap-2 py-3 bg-slate-900/60 hover:bg-slate-900 border border-slate-700 hover:border-slate-600 text-white font-medium rounded-xl transition-all duration-200 transform active:scale-[0.98]">
                <i class="fa-solid fa-arrow-left text-xs"></i>
                <span>Return to Sign In</span>
            </a>
        </div>
    </div>

</body>
</html>
