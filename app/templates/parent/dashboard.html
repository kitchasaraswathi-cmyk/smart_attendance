<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parent Dashboard</title>

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }

        body{
            background:#f5f6fa;
        }

        header{
            background:#2563eb;
            color:white;
            padding:18px 30px;
        }

        header h2{
            font-size:24px;
        }

        .container{
            padding:30px;
        }

        .cards{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
            gap:20px;
            margin-bottom:30px;
        }

        .card{
            background:white;
            padding:20px;
            border-radius:10px;
            box-shadow:0 2px 10px rgba(0,0,0,.1);
            text-align:center;
        }

        .card i{
            font-size:35px;
            color:#2563eb;
            margin-bottom:10px;
        }

        .card h3{
            margin-bottom:8px;
        }

        table{
            width:100%;
            border-collapse:collapse;
            background:white;
            box-shadow:0 2px 10px rgba(0,0,0,.1);
        }

        table th,
        table td{
            padding:12px;
            border:1px solid #ddd;
            text-align:center;
        }

        table th{
            background:#2563eb;
            color:white;
        }

        .present{
            color:green;
            font-weight:bold;
        }

        .absent{
            color:red;
            font-weight:bold;
        }
    </style>

</head>
<body>

<header>
    <h2><i class="fa-solid fa-user"></i> Parent Dashboard</h2>
</header>

<div class="container">

    <div class="cards">

        <div class="card">
            <i class="fa-solid fa-user-graduate"></i>
            <h3>Student</h3>
            <p>Sarasawathi</p>
        </div>

        <div class="card">
            <i class="fa-solid fa-calendar-check"></i>
            <h3>Present</h3>
            <p>22 Days</p>
        </div>

        <div class="card">
            <i class="fa-solid fa-calendar-xmark"></i>
            <h3>Absent</h3>
            <p>2 Days</p>
        </div>

        <div class="card">
            <i class="fa-solid fa-envelope"></i>
            <h3>Notifications</h3>
            <p>3</p>
        </div>

    </div>

    <h2 style="margin-bottom:15px;">Recent Attendance</h2>

    <table>

        <tr>
            <th>Date</th>
            <th>Status</th>
        </tr>

        <tr>
            <td>01-06-2026</td>
            <td class="present">Present</td>
        </tr>

        <tr>
            <td>31-05-2026</td>
            <td class="absent">Absent</td>
        </tr>

        <tr>
            <td>30-05-2026</td>
            <td class="present">Present</td>
        </tr>

    </table>

</div>

</body>
</html>
